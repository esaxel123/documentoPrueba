<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Documento</title>
    <style>
        /* Eliminamos margenes y obligamos a que el cuerpo use el 100% de la pantalla */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; /* Evita doble scroll */
            background-color: #333; /* Color de fondo oscuro como el lector de PDF */
        }
        
        /* El iframe ocupa todo el espacio disponible */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="Documento de Prueba.pdf"></iframe>
</body>
</html>
